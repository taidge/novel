title = "Novel"
description = "A fast static documentation site generator built with Rust"
root = "docs"
out_dir = "dist"
base = "/"
lang = "en"

[theme]
dark_mode = true
footer = "Built with Novel | Apache 2.0 License"

[taxonomies.tags]
name = "Tags"

[taxonomies.categories]
name = "Categories"

[i18n]
default_locale = "en"

[[i18n.locales]]
code = "en"
name = "English"
dir  = "en"

[[i18n.locales]]
code = "zh"
name = "简体中文"
dir  = "zh"
