name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: novel

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ steps.meta.outputs.tag }}" \
              --title "${{ steps.meta.outputs.tag }}" \
              --generate-notes \
              --draft
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for ${{ matrix.target }})
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build -p novel-cli --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build -p novel-cli --release --target ${{ matrix.target }}

      - name: Package archive
        id: package
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          target="${{ matrix.target }}"
          bin="${BIN_NAME}${{ matrix.ext }}"
          stage="novel-v${version}-${target}"
          mkdir -p "dist/${stage}"
          cp "target/${target}/release/${bin}" "dist/${stage}/"
          [ -f README.md ] && cp README.md "dist/${stage}/" || true
          [ -f LICENSE ]   && cp LICENSE   "dist/${stage}/" || true

          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${stage}.zip" "${stage}" >/dev/null
            echo "asset=dist/${stage}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "${stage}.tar.gz" "${stage}"
            echo "asset=dist/${stage}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "${{ steps.package.outputs.asset }}" --clobber

  publish:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mark release as published
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false
